name: Build C# Samples

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-latest

    defaults:
      run:
        working-directory: ./cs

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore CsSamples
      run: dotnet restore Samples/CsSamples.slnx

    - name: Build CsSamples
      run: dotnet build Samples/CsSamples.slnx --configuration Release --no-restore

